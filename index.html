<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AI Pet Home</title>
  <style>
    :root {
      --bg-0: #120b22;
      --bg-1: #1c1433;
      --bg-2: #2a2250;
      --surface: rgba(255, 255, 255, 0.08);
      --surface-strong: rgba(255, 255, 255, 0.12);
      --surface-soft: rgba(255, 255, 255, 0.06);
      --stroke: rgba(255, 255, 255, 0.14);
      --text: rgba(255, 255, 255, 0.96);
      --muted: rgba(255, 255, 255, 0.66);
      --subtle: rgba(255, 255, 255, 0.42);
      --pink: #f08bd6;
      --pink-2: #ff5bc4;
      --blue: #66e3ff;
      --orange: #f6b15e;
      --green: #7bd9b1;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(1000px 700px at 90% 10%, rgba(108, 92, 255, 0.28), transparent 55%),
        radial-gradient(700px 500px at 20% 20%, rgba(241, 139, 214, 0.18), transparent 60%),
        linear-gradient(180deg, #120b22 0%, #17112d 46%, #0f0a1d 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
        "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 80% 30%, rgba(255, 255, 255, 0.08), transparent 18%),
        radial-gradient(circle at 15% 80%, rgba(255, 255, 255, 0.06), transparent 15%);
      pointer-events: none;
    }

    .app {
      position: relative;
      min-height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) 18px calc(env(safe-area-inset-bottom) + 14px);
      overflow: hidden;
    }

    .halo {
      position: absolute;
      inset: auto -120px 26% auto;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(112, 139, 255, 0.25), transparent 62%);
      filter: blur(12px);
      pointer-events: none;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 24px;
      padding: 2px 2px 0;
      font-size: 14px;
      letter-spacing: 0.2px;
      color: rgba(255, 255, 255, 0.92);
    }

    .status-right {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 12px;
    }

    .pill {
      width: 22px;
      height: 12px;
      border-radius: 999px;
      border: 1.5px solid rgba(255, 255, 255, 0.8);
      position: relative;
    }

    .pill::after {
      content: "";
      position: absolute;
      inset: 2px 2px 2px auto;
      width: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
    }

    .notch {
      width: 120px;
      height: 28px;
      margin: 2px auto 8px;
      border-radius: 0 0 20px 20px;
      background: rgba(0, 0, 0, 0.84);
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.08);
    }

    .page-title {
      margin: 2px 0 8px;
      font-size: 28px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .section {
      margin-top: 16px;
    }

    .section-title {
      margin: 0 0 6px;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.92);
    }

    .section-desc {
      margin: 0 0 12px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }

    .card {
      position: relative;
      border-radius: 22px;
      padding: 14px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.06)),
        rgba(28, 20, 51, 0.82);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .pet-card {
      display: grid;
      grid-template-columns: 92px 1fr 76px;
      gap: 12px;
      align-items: center;
    }

    .pet-photo {
      width: 92px;
      height: 92px;
      border-radius: 18px;
      overflow: hidden;
      background:
        radial-gradient(circle at 35% 34%, #ffffff 0 18%, transparent 19%),
        radial-gradient(circle at 68% 32%, #ffffff 0 16%, transparent 17%),
        radial-gradient(circle at 50% 56%, #f5f1e9 0 45%, #cdbd95 46% 56%, transparent 57%),
        linear-gradient(135deg, #8ea0cc 0%, #c7b49c 48%, #6d7f6a 100%);
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .pet-photo::before {
      content: "";
      position: absolute;
      left: 14px;
      bottom: 13px;
      width: 54px;
      height: 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      filter: blur(12px);
    }

    .pet-meta h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .pet-meta .tone {
      margin-top: 2px;
      font-size: 11px;
      color: var(--pink);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .pet-meta p {
      margin: 6px 0 0;
      font-size: 12px;
      line-height: 1.55;
      color: var(--muted);
    }

    .level-ring {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, rgba(24, 17, 45, 0.92) 57%, transparent 58%),
        conic-gradient(var(--pink) 0 72deg, rgba(255, 255, 255, 0.16) 72deg 360deg);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .level-ring span {
      text-align: center;
      line-height: 1.15;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.7);
    }

    .level-ring strong {
      display: block;
      margin-top: 2px;
      font-size: 18px;
      color: white;
      font-weight: 800;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .card-head h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
    }

    .ghost-link {
      color: #f09adb;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
    }

    .stats-grid {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 54px 1fr 38px;
      gap: 10px;
      align-items: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.78);
    }

    .track {
      width: 100%;
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      overflow: hidden;
    }

    .fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(255,255,255,0.22), currentColor);
      box-shadow: 0 0 18px currentColor;
    }

    .fill.orange { color: var(--orange); }
    .fill.blue { color: var(--blue); }
    .fill.pink { color: var(--pink-2); }

    .metric {
      color: rgba(255, 255, 255, 0.62);
      text-align: right;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .chat-card {
      min-height: 108px;
      display: grid;
      gap: 10px;
    }

    .chat-bubble {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .chat-bubble .small {
      font-size: 12px;
      color: var(--muted);
      margin: 0 0 6px;
    }

    .chat-bubble .main {
      margin: 0;
      font-size: 14px;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.92);
    }

    .primary-button {
      min-height: 44px;
      border: 0;
      border-radius: 14px;
      padding: 0 18px;
      color: white;
      font-size: 14px;
      font-weight: 800;
      background: linear-gradient(135deg, #f18ad7, #9d6cff);
      box-shadow: 0 10px 25px rgba(241, 138, 215, 0.24);
      cursor: pointer;
    }

    .primary-button:active {
      transform: translateY(1px) scale(0.99);
    }

    .bottom-nav {
      position: sticky;
      bottom: calc(env(safe-area-inset-bottom) + 10px);
      margin-top: 18px;
      padding: 10px 10px 8px;
      border-radius: 22px;
      background: rgba(34, 23, 61, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.34);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .nav-item {
      min-height: 56px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      gap: 4px;
      color: rgba(255, 255, 255, 0.52);
      text-decoration: none;
      font-size: 11px;
      font-weight: 700;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item.active {
      color: #f09adb;
      background: rgba(240, 154, 219, 0.13);
      box-shadow: inset 0 0 0 1px rgba(240, 154, 219, 0.14);
    }

    .nav-item:active {
      transform: scale(0.98);
    }

    .spacer {
      height: 8px;
    }

    @media (min-width: 720px) {
      body {
        overflow: auto;
      }

      .app {
        min-height: auto;
        margin: 24px auto;
        border-radius: 36px;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="AI 宠物陪伴 App 首页">
    <div class="halo"></div>
    <div class="status">
      <div id="clock">11:14</div>
      <div class="status-right">
        <span>◔◔</span>
        <span>Wi‑Fi</span>
        <span class="pill" aria-hidden="true"></span>
      </div>
    </div>
    <div class="notch" aria-hidden="true"></div>

    <h1 class="page-title">主页</h1>

    <section class="section">
      <h2 class="section-title">今日陪伴</h2>
      <p class="section-desc">和你的猫咪一起，把今天过成值得收藏的故事。</p>

      <div class="card pet-card">
        <div class="pet-photo" aria-label="猫咪头像"></div>
        <div class="pet-meta">
          <h3>茵茵</h3>
          <div class="tone">Warm / Confident</div>
          <p>温柔 / 细腻 / 治愈<br />心细腻（ENFJ）小公主气质</p>
        </div>
        <div class="level-ring" aria-label="当前等级 Lv1">
          <span>累计<br /><strong>Lv 1</strong></span>
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">今日核心入口</h2>

      <div class="card">
        <div class="card-head">
          <h3>猫咪养成</h3>
          <a class="ghost-link" href="javascript:void(0)">去养成</a>
        </div>
        <div class="section-desc" style="margin-bottom: 6px;">饱食 · 精力 · 心情 · 陪伴</div>

        <div class="stats-grid">
          <div class="stat-row">
            <div>饱食</div>
            <div class="track"><div class="fill orange" style="width: 75%"></div></div>
            <div class="metric">75%</div>
          </div>
          <div class="stat-row">
            <div>精力</div>
            <div class="track"><div class="fill blue" style="width: 80%"></div></div>
            <div class="metric">80%</div>
          </div>
          <div class="stat-row">
            <div>心情</div>
            <div class="track"><div class="fill pink" style="width: 82%"></div></div>
            <div class="metric">82%</div>
          </div>
        </div>
      </div>

      <div class="spacer"></div>

      <div class="card chat-card">
        <div class="card-head">
          <h3>AI 聊天</h3>
          <a class="ghost-link" href="javascript:void(0)">去聊天</a>
        </div>
        <div class="chat-bubble">
          <p class="small">今日陪伴一句</p>
          <p class="main">如果你今天有点累，就先把世界放一边吧。我会陪你慢慢把心情捋顺。</p>
        </div>
        <button class="primary-button" type="button">开始对话</button>
      </div>
    </section>

    <nav class="bottom-nav" aria-label="底部导航">
      <a class="nav-item active" href="javascript:void(0)" aria-label="首页">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 11.5 12 5l8 6.5"></path>
          <path d="M6.5 10.5V19h11v-8.5"></path>
        </svg>
        <span>首页</span>
      </a>
      <a class="nav-item" href="javascript:void(0)" aria-label="聊天">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 6.5h14a2 2 0 0 1 2 2V15a2 2 0 0 1-2 2H11l-5 3v-3H5a2 2 0 0 1-2-2V8.5a2 2 0 0 1 2-2Z"></path>
        </svg>
        <span>聊天</span>
      </a>
      <a class="nav-item" href="javascript:void(0)" aria-label="故事">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 5.5h6a4 4 0 0 1 4 4V19a3 3 0 0 0-3-3H5z"></path>
          <path d="M19 5.5h-6a4 4 0 0 0-4 4V19a3 3 0 0 1 3-3h7z"></path>
        </svg>
        <span>故事</span>
      </a>
      <a class="nav-item" href="javascript:void(0)" aria-label="设置">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3.8a7 7 0 0 0-1.8-1l-.3-2.4H9.4l-.3 2.4a7 7 0 0 0-1.8 1L5 6l-2 3.5L5 11a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.3-.8a7 7 0 0 0 1.8 1l.3 2.4h4.8l.3-2.4a7 7 0 0 0 1.8-1l2.3.8 2-3.5-2-1.5c.1-.3.1-.7.1-1Z"></path>
        </svg>
        <span>设置</span>
      </a>
    </nav>
  </main>

  <script>
    const clock = document.getElementById('clock');
    const now = new Date();
    clock.textContent = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach((item) => {
      item.addEventListener('click', (event) => {
        event.preventDefault();
        navItems.forEach((node) => node.classList.remove('active'));
        item.classList.add('active');
      });
    });
  </script>
</body>
</html>
